apiVersion: apps/v1
kind: Deployment
metadata:
  name: gkx-frontend
  namespace: gekaixing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gkx-frontend
  template:
    metadata:
      labels:
        app: gkx-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/kaixing/gekaixing-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXTAUTH_URL
              value: https://gekaixing.example.com
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: gkx-backend-secret
                  key: AUTH_SECRET
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
