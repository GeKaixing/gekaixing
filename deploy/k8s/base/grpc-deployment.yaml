apiVersion: apps/v1
kind: Deployment
metadata:
  name: gkx-backend-grpc
  namespace: gekaixing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gkx-backend-grpc
  template:
    metadata:
      labels:
        app: gkx-backend-grpc
    spec:
      containers:
        - name: grpc
          image: ghcr.io/kaixing/gekaixing-backend-grpc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: gkx-backend-config
            - secretRef:
                name: gkx-backend-secret
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
