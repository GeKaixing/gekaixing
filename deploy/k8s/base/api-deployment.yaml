apiVersion: apps/v1
kind: Deployment
metadata:
  name: gkx-backend-api
  namespace: gekaixing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gkx-backend-api
  template:
    metadata:
      labels:
        app: gkx-backend-api
    spec:
      containers:
        - name: api
          image: ghcr.io/kaixing/gekaixing-backend-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: gkx-backend-config
            - secretRef:
                name: gkx-backend-secret
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
